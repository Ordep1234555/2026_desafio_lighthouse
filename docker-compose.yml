services:
  postgres_lh:
    image: postgres:15
    container_name: bd_nautical
    restart: always
    environment:
      POSTGRES_DB: LH_Nautical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lighthouse_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

volumes:
  lighthouse_data:
